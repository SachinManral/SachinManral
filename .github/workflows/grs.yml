name: Update README Stats Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Generate README stats cards
        env:
          GH_USERNAME: SachinManral
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/scripts/generate_stats_cards.py

      - name: Verify cards are valid SVG
        run: |
          test -s profile/stats.svg
          test -s profile/top-langs.svg
          if grep -qi "Something went wrong" profile/stats.svg; then
            echo "stats.svg contains an error"
            cat profile/stats.svg
            exit 1
          fi
          if grep -qi "Something went wrong" profile/top-langs.svg; then
            echo "top-langs.svg contains an error"
            cat profile/top-langs.svg
            exit 1
          fi
          echo "Both cards generated successfully"

      - name: Commit and push updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update README stats cards [skip ci]"
          git push
